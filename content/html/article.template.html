<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
</head>
<body>
  <article>
    <header>
      <h1>{{title}}</h1>
      <p class="meta">
        <time datetime="{{date}}">{{date_formatted}}</time>
        {{#if author}}<span class="author">By {{author}}</span>{{/if}}
      </p>
    </header>
    
    <section class="content">
      {{content}}
    </section>
    
    {{#if tags}}
    <footer class="tags">
      {{#each tags}}
      <span class="tag">{{this}}</span>
      {{/each}}
    </footer>
    {{/if}}
  </article>
</body>
</html>
